name: release-please

# Auto-versioning. Parses conventional-commit messages on push to main,
# opens a release PR with the bumped version + changelog. Merging the
# release PR cuts the tag + GitHub release. Consumers pin to `rev:` in
# .pre-commit-config.yaml, bump via `pre-commit autoupdate` or the
# `apply-agentic-os-hooks` rollout.
#
# No untrusted user input is referenced in any run: step.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
