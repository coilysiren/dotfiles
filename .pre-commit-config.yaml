repos:
  # This repo ships the catalog hooks. Dogfood them via a local reference
  # to the package in this checkout. Consumers reference us as
  # repo: https://github.com/coilysiren/agentic-os instead.
  - repo: local
    hooks:
      - id: catalog-block-present
        name: .coily/coily.yaml catalog block present
        entry: python -m agentic_os.check_catalog_block
        language: python
        additional_dependencies: [pyyaml]
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
      # catalog-doc-size and catalog-trifecta intentionally not yet wired
      # on this repo. README + docs/FEATURES still need See-also sections;
      # fix in a follow-up before enabling.
      - id: closes-issue
        name: commit closes a GitHub issue
        entry: python -m agentic_os.check_commit_closes_issue
        language: python
        stages: [commit-msg]
      - id: strip-warp-thrash
        name: strip GUI thrash from warp/settings.toml
        entry: python -m agentic_os.strip_warp_thrash
        language: python
        files: ^warp/settings\.toml$
        stages: [pre-commit]
  # No managed upstream-ref block here. This repo is the source; the rollout
  # is expected to never run against agentic-os itself. The local block above
  # dogfoods the validators via the in-checkout package.
