# Example .pre-commit-config.yaml entry.
#
# These hooks are stamped into each consumer repo by agentic-os-kai's
# `make apply-skill-discipline-hooks` rollout. The rollout copies
# validate-skills.py and check-dead-links.py from coilysiren/agentic-os/scripts/
# into the consumer's own scripts/ dir, then upserts a managed block in
# .pre-commit-config.yaml that looks like this:

repos:
  - repo: local
    hooks:
      - id: validate-skills
        name: skill conventions
        description: Validate the structure of .claude/skills/ against .claude/skills/categories.yaml.
        entry: python scripts/validate-skills.py
        language: python
        additional_dependencies: [pyyaml]
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]

      - id: check-dead-links
        name: dead cross-links
        description: Validate that inline markdown links inside .claude/skills/ resolve to real files.
        entry: python scripts/check-dead-links.py
        language: python
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]

      - id: check-commit-closes-issue
        name: commit closes a GitHub issue
        description: Reject commit messages without a GitHub closing keyword (closes/fixes/resolves #N) for an issue in the same repo.
        entry: python scripts/check-commit-closes-issue.py
        language: python
        stages: [commit-msg]
